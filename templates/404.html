{% extends 'base.html' %}
{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
    <div class="glass" style="padding: 4rem; border-radius: 24px; max-width: 600px;">
        <div style="font-size: 6rem; font-weight: 900; color: var(--primary); line-height: 1;">404</div>
        <h2 style="font-size: 1.8rem; margin: 1rem 0 0.5rem;">Page Not Found</h2>
        <p style="color: #6b7280; margin-bottom: 2rem;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('dashboard') }}" class="btn-cta">
            <i class="fas fa-home"></i> Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
